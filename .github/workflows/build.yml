name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"
          sdkmanager "ndk;28.2.13676358" || true
          # Symlink android-37 → android-36 since platform 37 isn't available yet
          ln -s android-36 $ANDROID_HOME/platforms/android-37

      - name: Create local.properties for signing
        run: |
          echo "storeFile=../app/release.jks" > local.properties
          echo "storePassword=release123" >> local.properties
          echo "keyAlias=rikkahub" >> local.properties
          echo "keyPassword=release123" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rikkahub-agent-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
